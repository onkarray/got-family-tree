<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Iron Lineage — Game of Thrones Family Tree</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060408;--surface:#0d0a10;--border:#281e30;
  --text:#e8ddd4;--muted:#7a7080;--gold:#c9a84c;--gold-dim:#7a5e20;
}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow-x:hidden;min-height:100vh}

/* BACKGROUND */
#bg-canvas{position:fixed;inset:0;pointer-events:none;z-index:0}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:1;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%,rgba(192,57,43,0.07) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 5%,rgba(123,158,166,0.06) 0%,transparent 70%),
    radial-gradient(ellipse 80% 60% at 50% 100%,rgba(10,8,12,0.8) 0%,transparent 100%);
}

/* HEADER */
#header{position:relative;z-index:10;text-align:center;padding:52px 24px 32px}
.eyebrow{
  font-family:'Cinzel',serif;font-size:10.5px;letter-spacing:0.35em;
  text-transform:uppercase;color:var(--gold-dim);margin-bottom:14px;opacity:0.8;
}
.main-title{
  font-family:'Cinzel Decorative',serif;font-size:clamp(1.8rem,5.5vw,4.2rem);
  font-weight:700;letter-spacing:0.06em;line-height:1.05;margin-bottom:6px;
  background:linear-gradient(175deg,#f0e8d8 0%,#c9a84c 45%,#8b5e1e 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 30px rgba(201,168,76,0.25));
}
.subtitle{
  font-family:'Cinzel',serif;font-size:12px;letter-spacing:0.12em;
  color:var(--muted);margin-bottom:28px;
}
.spoiler-note{
  display:inline-block;font-size:10px;color:#6a4040;border:1px solid #4a2828;
  border-radius:3px;padding:3px 10px;letter-spacing:0.08em;font-family:'Cinzel',serif;
  margin-bottom:28px;
}

/* FILTERS */
#filters{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.filter-btn{
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.1em;
  text-transform:uppercase;padding:5px 13px;border-radius:20px;border:1px solid;
  background:transparent;cursor:pointer;transition:all 0.2s;color:inherit;
}
.filter-btn.active,.filter-btn:hover{color:#fff!important}

/* LEGEND */
#legend{
  display:flex;justify-content:center;gap:18px;flex-wrap:wrap;
  font-size:10px;color:var(--muted);font-family:'Cinzel',serif;
  letter-spacing:0.06em;margin-bottom:4px;
}
.leg{display:flex;align-items:center;gap:6px}
.leg-line{width:28px;height:0;border-top:2px solid}
.leg-dash{width:28px;height:0;border-top:2px dashed}

/* SCROLL HINT */
#scroll-hint{
  position:relative;z-index:10;text-align:center;
  font-size:10px;color:var(--muted);font-family:'Cinzel',serif;
  letter-spacing:0.12em;padding:6px 0 12px;opacity:0.55;
}

/* TREE */
#tree-wrap{
  position:relative;z-index:5;overflow-x:auto;overflow-y:visible;
  padding:10px 50px 80px;-webkit-overflow-scrolling:touch;
}
#tree-wrap::-webkit-scrollbar{height:4px}
#tree-wrap::-webkit-scrollbar-track{background:var(--surface)}
#tree-wrap::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px}
#tree{position:relative;width:3020px;height:700px}

/* SVG layer */
#svg-layer{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible}

/* HOUSE ZONE RECTS (inside SVG) */

/* CHARACTER NODES */
.cnode{
  position:absolute;width:80px;
  transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;
  cursor:pointer;transition:transform 0.18s ease;z-index:20;
}
.cnode:hover{transform:translate(-50%,-50%) scale(1.2)}
.cring{
  width:58px;height:58px;border-radius:50%;border:2.5px solid;
  display:flex;align-items:center;justify-content:center;
  position:relative;transition:box-shadow 0.2s;
  background:rgba(12,8,16,0.92);
}
.cring::after{
  content:'';position:absolute;inset:-5px;border-radius:50%;
  background:radial-gradient(ellipse,var(--hc,#fff) 0%,transparent 70%);
  opacity:0.07;pointer-events:none;
}
.cinitial{font-family:'Cinzel',serif;font-size:17px;font-weight:700}
.cmark{position:absolute;top:-5px;right:-5px;font-size:11px;line-height:1}
.cname{
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.05em;
  text-align:center;margin-top:5px;color:var(--text);line-height:1.3;max-width:82px;
}
.ctitle{
  font-size:8px;color:var(--muted);text-align:center;
  font-family:'Inter',sans-serif;margin-top:1px;max-width:82px;line-height:1.2;
}

/* HOUSE ZONE LABELS */
.hlabel{
  position:absolute;font-family:'Cinzel',serif;font-size:9.5px;
  letter-spacing:0.22em;text-transform:uppercase;pointer-events:none;opacity:0.22;
  font-weight:600;
}

/* GEN LABELS */
.glabel{
  position:absolute;font-family:'Cinzel',serif;font-size:8px;
  letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);
  opacity:0.35;left:-30px;
}

/* TOOLTIP */
#tt{
  position:fixed;z-index:1000;background:rgba(8,5,12,0.97);
  border:1px solid;border-radius:8px;padding:15px 17px;max-width:270px;
  pointer-events:none;opacity:0;transition:opacity 0.12s;
  box-shadow:0 8px 40px rgba(0,0,0,0.8);
}
#tt.on{opacity:1}
.tt-house{font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:4px}
.tt-name{font-family:'Cinzel',serif;font-size:15px;font-weight:600;color:var(--text);margin-bottom:3px;line-height:1.2}
.tt-job{font-size:10.5px;color:var(--muted);margin-bottom:7px;font-style:italic;line-height:1.3}
.tt-stat{font-size:10.5px;margin-bottom:7px}
.tt-desc{font-size:11.5px;color:#b0a8b8;line-height:1.55}

/* ---- ANIMATIONS ---- */
@keyframes emFloat{
  0%{transform:translateY(0) translateX(0);opacity:0}
  8%{opacity:1}
  92%{opacity:0.8}
  100%{transform:translateY(-110vh) translateX(var(--dx,0px));opacity:0}
}
</style>
</head>

  {f:'rickard', t:'ned',      type:'child'},
  {f:'rickard', t:'lyanna',   type:'child'},
  {f:'rickard', t:'benjen',   type:'child'},

  // Hoster Tully → children
  {f:'hoster',  t:'catelyn',  type:'child'},
  {f:'hoster',  t:'lysa',     type:'child'},
  {f:'hoster',  t:'edmure',   type:'child'},

  // Ned + Catelyn → children
  {f:'ned',     t:'robb',     type:'child'},
  {f:'ned',     t:'sansa',    type:'child'},
  {f:'ned',     t:'arya',     type:'child'},
  {f:'ned',     t:'bran',     type:'child'},
  {f:'ned',     t:'rickon',   type:'child'},

  // Tywin → children
  {f:'tywin',   t:'cersei',   type:'child'},
  {f:'tywin',   t:'jaime',    type:'child'},
  {f:'tywin',   t:'tyrion',   type:'child'},

  // Cersei + Jaime → children (incest)
  {f:'cersei',  t:'joffrey',  type:'incest'},
  {f:'cersei',  t:'myrcella', type:'incest'},
  {f:'cersei',  t:'tommen',   type:'incest'},

  // Robert bastard
  {f:'robert',  t:'gendry',   type:'bastard'},

  // Stannis → Shireen
  {f:'stannis', t:'shireen',  type:'child'},

  // Greyjoy
  {f:'balon',   t:'theon',    type:'child'},
  {f:'balon',   t:'yara',     type:'child'},
];

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const byId = id => CHARS.find(c => c.id === id);
const R = 29; // node radius

// ─── RENDER CONNECTIONS ──────────────────────────────────────────────────────
function renderConns() {
  const svg = document.getElementById('svg-layer');

  // House zone backgrounds
  const zones = [
    {h:'targaryen', x:80,   y:90,  w:470, ht:570},
    {h:'stark',     x:600,  y:90,  w:670, ht:570},
    {h:'tully',     x:1295, y:90,  w:265, ht:360},
    {h:'baratheon', x:1620, y:90,  w:460, ht:570},
    {h:'lannister', x:2160, y:90,  w:470, ht:570},
    {h:'greyjoy',   x:2680, y:90,  w:260, ht:570},
  ];
  zones.forEach(z => {
    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x', z.x); rect.setAttribute('y', z.y);
    rect.setAttribute('width', z.w); rect.setAttribute('height', z.ht);
    rect.setAttribute('rx', '12');
    rect.setAttribute('fill', H[z.h].c);
    rect.setAttribute('opacity', '0.035');
    svg.appendChild(rect);
  });

  // Generation dividers
  [140, 340, 540].forEach((y, i) => {
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1','60'); line.setAttribute('y1', y);
    line.setAttribute('x2','2980'); line.setAttribute('y2', y);
    line.setAttribute('stroke','rgba(255,255,255,0.04)');
    line.setAttribute('stroke-width','1');
    svg.appendChild(line);
  });

  // Connections
  CONNS.forEach(conn => {
    const f = byId(conn.f), t = byId(conn.t);
    if (!f || !t) return;

    let d, stroke, sw=1.8, dash='none', op=0.6;

    if (conn.type === 'marriage') {
      const dist = Math.abs(t.x - f.x);
      if (dist > 280) {
        const mx = (f.x + t.x) / 2, my = f.y - 70;
        d = `M ${f.x+R} ${f.y} Q ${mx} ${my} ${t.x-R} ${t.y}`;
      } else {
        d = `M ${f.x+R} ${f.y} L ${t.x-R} ${t.y}`;
      }
      stroke='#C9A84C'; sw=2.2; op=0.85;

    } else if (conn.type === 'secret') {
      const mx = (f.x + t.x) / 2, my = Math.min(f.y,t.y) - 115;
      d = `M ${f.x} ${f.y-R} Q ${mx} ${my} ${t.x} ${t.y-R}`;
      stroke='#9B59B6'; sw=1.5; dash='8 5'; op=0.8;

    } else if (conn.type === 'child' || conn.type === 'incest') {
      const fx=f.x, fy=f.y+R, tx=t.x, ty=t.y-R;
      const mid = fy + (ty-fy)*0.5;
      d = `M ${fx} ${fy} C ${fx} ${mid} ${tx} ${mid} ${tx} ${ty}`;
      stroke = conn.type === 'incest' ? '#922B21' : H[f.house].c;
      op = conn.type === 'incest' ? 0.45 : 0.5;

    } else if (conn.type === 'bastard') {
      const fx=f.x, fy=f.y+R, tx=t.x, ty=t.y-R;
      const mid = fy + (ty-fy)*0.5;
      d = `M ${fx} ${fy} C ${fx} ${mid} ${tx} ${mid} ${tx} ${ty}`;
      stroke='#7F8C8D'; dash='5 4'; op=0.45;
    }

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', d);
    path.setAttribute('stroke', stroke);
    path.setAttribute('stroke-width', sw);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke-dasharray', dash);
    path.setAttribute('opacity', op);
    path.setAttribute('data-f', conn.f);
    path.setAttribute('data-t', conn.t);
    path.setAttribute('data-type', conn.type);
    svg.appendChild(path);

    // Animated travel dot on marriage lines
    if (conn.type === 'marriage') {
      const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('r','3.5');
      dot.setAttribute('fill','#C9A84C');
      dot.setAttribute('opacity','0.9');
      const anim = document.createElementNS('http://www.w3.org/2000/svg','animateMotion');
      anim.setAttribute('dur', (2.5 + Math.random()*1.5)+'s');
      anim.setAttribute('repeatCount','indefinite');
      anim.setAttribute('path', d);
      dot.appendChild(anim);
      svg.appendChild(dot);
    }
  });

  // Secret marriage label
  const rh = byId('rhaegar'), ly = byId('lyanna');
  const slx = (rh.x+ly.x)/2, sly = Math.min(rh.y,ly.y)-130;
  addSvgText(svg, slx, sly, 'SECRET MARRIAGE', '#9B59B6', 9, 1.5);

  // Incest arc Cersei ↔ Jaime
  const ce = byId('cersei'), ja = byId('jaime');
  const ip = document.createElementNS('http://www.w3.org/2000/svg','path');
  const imx = (ce.x+ja.x)/2;
  ip.setAttribute('d', `M ${ce.x+R} ${ce.y} Q ${imx} ${ce.y-50} ${ja.x-R} ${ja.y}`);
  ip.setAttribute('stroke','#922B21');ip.setAttribute('stroke-width','1.2');
  ip.setAttribute('fill','none');ip.setAttribute('stroke-dasharray','5 3');ip.setAttribute('opacity','0.5');
  svg.appendChild(ip);
  addSvgText(svg, imx, ce.y-58, '⚠ INCEST', '#922B21', 8.5, 1);
}

function addSvgText(svg, x, y, txt, fill, size, op) {
  const t = document.createElementNS('http://www.w3.org/2000/svg','text');
  t.setAttribute('x',x); t.setAttribute('y',y);
  t.setAttribute('text-anchor','middle');
  t.setAttribute('fill',fill);
  t.setAttribute('font-family','Cinzel,serif');
  t.setAttribute('font-size',size);
  t.setAttribute('letter-spacing','1.5');
  t.setAttribute('opacity',op);
  t.textContent = txt;
  svg.appendChild(t);
}

// ─── RENDER NODES ────────────────────────────────────────────────────────────
function renderNodes() {
  const layer = document.getElementById('nl');

  // Generation labels
  [{y:140,label:'GENERATION I'},{y:340,label:'GENERATION II'},{y:540,label:'GENERATION III'}].forEach(g => {
    const el = document.createElement('div');
    el.className = 'glabel';
    el.style.top = (g.y - 6) + 'px';
    el.textContent = g.label;
    layer.appendChild(el);
  });

  // House labels
  const zones = [
    {label:'House Targaryen', color:H.targaryen.c, x:82,   y:95},
    {label:'House Stark',     color:H.stark.c,     x:605,  y:95},
    {label:'House Tully',     color:H.tully.c,     x:1298, y:95},
    {label:'House Baratheon', color:H.baratheon.c, x:1624, y:95},
    {label:'House Lannister', color:H.lannister.c, x:2165, y:95},
    {label:'House Greyjoy',   color:H.greyjoy.c,   x:2684, y:95},
  ];
  zones.forEach(z => {
    const el = document.createElement('div');
    el.className = 'hlabel';
    el.style.left = z.x + 'px';
    el.style.top  = z.y + 'px';
    el.style.color = z.color;
    el.textContent = z.label.toUpperCase();
    layer.appendChild(el);
  });

  // Character nodes
  CHARS.forEach(ch => {
    const house = H[ch.house];
    const node = document.createElement('div');
    node.className = 'cnode';
    node.id = 'node-' + ch.id;
    node.setAttribute('data-id', ch.id);
    node.setAttribute('data-house', ch.house);
    node.style.left = ch.x + 'px';
    node.style.top  = ch.y + 'px';

    const ringBg = ch.dead
      ? 'radial-gradient(circle at 40% 35%, rgba(40,25,30,0.95), rgba(10,6,12,0.97))'
      : 'radial-gradient(circle at 40% 35%, rgba(18,12,24,0.95), rgba(8,5,12,0.97))';
    const ringOp = ch.dead ? '0.72' : '1';
    const markHtml = ch.dead
      ? `<span class="cmark" style="color:#C0392B;font-size:12px" title="Deceased">⚔</span>`
      : `<span class="cmark" style="color:#2ECC71;font-size:10px" title="Alive">✦</span>`;
    const shortTitle = ch.title.split('·')[0].split(',')[0].trim();

    node.innerHTML = `
      <div class="cring"
           style="border-color:${house.c};
                  box-shadow:0 0 12px ${house.c}40;
                  background:${ringBg};
                  opacity:${ringOp};
                  --hc:${house.c}">
        <span class="cinitial" style="color:${house.c}">${ch.name[0]}</span>
        ${markHtml}
      </div>
      <div class="cname">${ch.name}</div>
      <div class="ctitle">${shortTitle}</div>
    `;

    node.addEventListener('mouseenter', e => {
      showTT(ch, e);
      node.querySelector('.cring').style.boxShadow =
        `0 0 22px ${house.g}99, 0 0 44px ${house.g}40, inset 0 0 12px ${house.c}22`;
      highlightConnected(ch.id);
    });
    node.addEventListener('mousemove', moveTT);
    node.addEventListener('mouseleave', () => {
      hideTT();
      node.querySelector('.cring').style.boxShadow = `0 0 12px ${house.c}40`;
      clearHighlight();
    });

    layer.appendChild(node);
  });
}

// ─── TOOLTIP ─────────────────────────────────────────────────────────────────
const tt = document.getElementById('tt');
function showTT(ch, e) {
  const house = H[ch.house];
  document.getElementById('tt-h').textContent = house.label.toUpperCase() + ' · "' + house.words + '"';
  document.getElementById('tt-h').style.color = house.c;
  tt.style.borderColor = house.c;
  document.getElementById('tt-n').textContent = ch.name;
  document.getElementById('tt-j').textContent = ch.title;
  document.getElementById('tt-s').innerHTML = ch.dead
    ? '<span style="color:#C0392B">⚔ Deceased</span>'
    : '<span style="color:#2ECC71">✦ Alive as of Season 8 Finale</span>';
  document.getElementById('tt-d').textContent = ch.info;
  moveTT(e);
  tt.classList.add('on');
}
function moveTT(e) {
  const x = e.clientX + 18, y = e.clientY - 12;
  const w = tt.offsetWidth, h = tt.offsetHeight;
  tt.style.left = (x + w > window.innerWidth  - 10 ? x - w - 36 : x) + 'px';
  tt.style.top  = (y + h > window.innerHeight - 10 ? y - h      : y) + 'px';
}
function hideTT() { tt.classList.remove('on'); }

// ─── HIGHLIGHT CONNECTED ─────────────────────────────────────────────────────
function highlightConnected(id) {
  const connected = new Set([id]);
  CONNS.forEach(c => {
    if (c.f === id) connected.add(c.t);
    if (c.t === id) connected.add(c.f);
  });

  document.querySelectorAll('.cnode').forEach(n => {
    const nid = n.getAttribute('data-id');
    n.style.opacity = connected.has(nid) ? '1' : '0.25';
  });

  document.querySelectorAll('#svg-layer path').forEach(p => {
    const pf = p.getAttribute('data-f'), pt = p.getAttribute('data-t');
    if (!pf || !pt) return;
    const rel = pf === id || pt === id;
    p.style.opacity = rel ? '1' : '0.06';
    if (rel) p.setAttribute('stroke-width', parseFloat(p.getAttribute('stroke-width') || 1.8) * 1.5);
  });
}
function clearHighlight() {
  document.querySelectorAll('.cnode').forEach(n => n.style.opacity = '1');
  document.querySelectorAll('#svg-layer path').forEach(p => {
    if (!p.getAttribute('data-f')) return;
    p.style.opacity = p.getAttribute('opacity') || '0.6';
    const type = p.getAttribute('data-type');
    const sw = type === 'marriage' ? 2.2 : 1.8;
    p.setAttribute('stroke-width', sw);
  });
}

// ─── HOUSE FILTER ────────────────────────────────────────────────────────────
function filter(house) {
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.remove('active');
    b.style.background = 'transparent';
  });
  const btn = document.querySelector(`[data-h="${house}"]`);
  if (btn) {
    btn.classList.add('active');
    const houseColor = house === 'all' ? '#c9a84c' : H[house].c;
    btn.style.background = houseColor + '22';
    btn.style.color = '#fff';
  }

  document.querySelectorAll('.cnode').forEach(node => {
    if (house === 'all') {
      node.style.opacity = '1'; node.style.filter = 'none'; return;
    }
    const id = node.getAttribute('data-id');
    const ch = byId(id);
    const inHouse = ch.house === house;
    const linked = CONNS.some(c =>
      (c.f === id || c.t === id) &&
      (byId(c.f)?.house === house || byId(c.t)?.house === house)
    );
    node.style.opacity = (inHouse || linked) ? '1' : '0.1';
    node.style.filter  = (inHouse || linked) ? 'none' : 'grayscale(1) brightness(0.4)';
  });

  document.querySelectorAll('#svg-layer path').forEach(p => {
    if (!p.getAttribute('data-f')) { p.style.opacity = house === 'all' ? '1' : '0.03'; return; }
    if (house === 'all') { p.style.opacity = p.getAttribute('opacity') || '0.6'; return; }
    const f = byId(p.getAttribute('data-f')), t = byId(p.getAttribute('data-t'));
    const rel = f?.house === house || t?.house === house;
    p.style.opacity = rel ? (p.getAttribute('opacity') || '0.6') : '0.05';
  });
}

// ─── PARTICLES (EMBERS) ──────────────────────────────────────────────────────
function initParticles() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H_px;
  function resize() { W = canvas.width = window.innerWidth; H_px = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  const COLS = ['#FF4500','#FF6600','#FF8C00','#FFB300','#FF3300','#E8821F','#FFD700'];
  const pts = Array.from({length:80}, () => ({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    s: Math.random() * 2.2 + 0.4,
    sp: Math.random() * 0.7 + 0.25,
    dr: (Math.random() - 0.5) * 0.45,
    col: COLS[Math.floor(Math.random() * COLS.length)],
    ph: Math.random() * Math.PI * 2,
  }));

  function draw() {
    ctx.clearRect(0, 0, W, H_px);
    pts.forEach(p => {
      p.y -= p.sp; p.x += p.dr; p.ph += 0.04;
      const alpha = (Math.sin(p.ph) * 0.25 + 0.55) * 0.65;
      if (p.y < -8) { p.y = H_px + 8; p.x = Math.random() * W; }
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.shadowBlur = 7; ctx.shadowColor = p.col;
      ctx.fillStyle = p.col;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    });
    requestAnimationFrame(draw);
  }
  draw();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  renderConns();
  renderNodes();
  initParticles();
});
</script>
